<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Birthday Surprise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <div class="landing-content">
      <h1>Is it your birthday?</h1>
      <button id="yesButton">yes!</button>
    </div>
  </div>

  <!-- Car transition overlay -->
  <div id="transition-layer">
    <img src="assets/mclaren.png" alt="McLaren F1 car" id="car" />
  </div>

  <!-- Main birthday screen -->
  <div id="main-screen">

    <!-- Confetti layer -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Heart shape + content -->
    <div id="heart-container">

      <!-- Heart body (CSS pseudo-elements + lobes build the shape) -->
      <div id="heart-bg"></div>
      <div class="heart-lobe left"></div>
      <div class="heart-lobe right"></div>

      <!-- Happy Birthday text in the centre -->
      <div id="hb-text">
        <h2>Happy<br>Birthday!</h2>
        <div class="emoji-row">
          <span>🎊</span>
          <span>🎣🐟</span>
          <span>💙</span>
        </div>
      </div>

      <!-- Picture cutouts surrounding the heart -->
      <div class="person" id="p1">
        <img src="assets/jaze-kabia.png" alt="Jaze Kabia" />
        <p>Jaze Kabia</p>
      </div>
      <div class="person" id="p2">
        <img src="assets/kieran-green.png" alt="Kieran Green" />
        <p>Kieran Green</p>
      </div>
      <div class="person" id="p3">
        <img src="assets/leah-williamson.png" alt="Leah Williamson" />
        <p>Leah Williamson</p>
      </div>
      <div class="person" id="p4">
        <img src="assets/oscar-piastri.png" alt="Oscar Piastri" />
        <p>Oscar Piastri</p>
      </div>
      <div class="person" id="p5">
        <img src="assets/lauren-bell.png" alt="Lauren Bell" />
        <p>Lauren Bell</p>
      </div>

    </div>
  </div>

  <audio id="birthdaySong" src="assets/half-the-world-away.mp3"></audio>
  <script src="script.js"></script>
</body>
</html>
