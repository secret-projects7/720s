<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Birthday Surprise</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Landing screen -->
  <div id="landing">
    <div class="landing-content">
      <h1>Is it your birthday?</h1>
      <button id="yesButton">yes!</button>
    </div>
  </div>

  <!-- Car transition overlay -->
  <div id="transition-layer">
    <img src="assets/mclaren.png" alt="McLaren F1 car" id="car" />
  </div>

  <!-- Main birthday screen -->
  <div id="main-screen">
    <canvas id="confetti-canvas"></canvas>

    <!-- Heart + portraits -->
    <div id="heart-wrapper">

      <!-- Inline SVG heart shape -->
      <svg id="heart-svg" viewBox="0 0 100 95" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hg" cx="50%" cy="40%" r="60%">
            <stop offset="0%"  stop-color="#e56717"/>
            <stop offset="60%" stop-color="#c0392b"/>
            <stop offset="100%" stop-color="#8b0000"/>
          </radialGradient>
        </defs>
        <path d="M50 90 C50 90 5 58 5 28 C5 13 17 4 30 4 C38 4 45 8 50 14 C55 8 62 4 70 4 C83 4 95 13 95 28 C95 58 50 90 50 90 Z"
              fill="url(#hg)" />
      </svg>

      <!-- Happy Birthday text, centred over the heart -->
      <div id="hb-text">
        <h2>Happy<br>Birthday!</h2>
        <div class="emoji-row">
          <span>🎊</span>
          <span>🎣🐟</span>
          <span>💙</span>
        </div>
      </div>

      <!-- Person cutouts around the heart -->
      <div class="person" id="p1">
        <img src="assets/jaze-kabia.png" alt="Jaze Kabia" />
        <p>Jaze Kabia</p>
      </div>
      <div class="person" id="p2">
        <img src="assets/kieran-green.png" alt="Kieran Green" />
        <p>Kieran Green</p>
      </div>
      <div class="person" id="p3">
        <img src="assets/leah-williamson.png" alt="Leah Williamson" />
        <p>Leah Williamson</p>
      </div>
      <div class="person" id="p4">
        <img src="assets/oscar-piastri.png" alt="Oscar Piastri" />
        <p>Oscar Piastri</p>
      </div>
      <div class="person" id="p5">
        <img src="assets/lauren-bell.png" alt="Lauren Bell" />
        <p>Lauren Bell</p>
      </div>

    </div>
  </div>

  <audio id="birthdaySong" src="assets/half-the-world-away.mp3"></audio>
  <script src="script.js"></script>
</body>
</html>
